<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>修改密码 - 员工绩效分析</title>
  <style>
    body { font-family: "Microsoft YaHei", sans-serif; background: #eef2f7; margin: 0; }
    .box { width: 440px; margin: 48px auto; background: #fff; border-radius: 10px; padding: 28px 28px 22px; box-shadow: 0 4px 20px rgba(0,0,0,.06); }
    h1 { font-size: 20px; margin: 0 0 8px; color: #1a1a1a; }
    .sub { font-size: 13px; color: #57606a; margin-bottom: 16px; }
    label { display: block; margin: 10px 0 6px; color: #444; font-size: 14px; }
    input { width: 100%; box-sizing: border-box; padding: 10px 12px; border: 1px solid #d0d7de; border-radius: 8px; font-size: 14px; }
    button { width: 100%; margin-top: 18px; padding: 11px; border: none; border-radius: 8px; background: #0969da; color: #fff; font-size: 15px; cursor: pointer; }
    .err { color: #cf222e; font-size: 13px; margin-bottom: 10px; }
    .hint { font-size: 12px; color: #57606a; line-height: 1.55; margin-bottom: 14px; padding: 10px 12px; background: #f6f8fa; border-radius: 8px; border: 1px solid #d8dee4; }
    .hint code { font-size: 11px; background: #eaeef2; padding: 1px 4px; border-radius: 4px; }
    .back { margin-top: 14px; text-align: center; font-size: 13px; }
    .back a { color: #0969da; text-decoration: none; }
  </style>
</head>
<body>
  <div class="box">
    <h1>修改密码</h1>
    <p class="sub">当前账号：<strong>{{ username }}</strong></p>
    {% with messages = get_flashed_messages() %}
      {% if messages %}<div class="err">{{ messages[0] }}</div>{% endif %}
    {% endwith %}
    <p class="hint">
      <strong>首次登录须修改密码</strong>：当前密码一般为初始规则（与账号相同，或由环境变量覆盖）。新口令至少 8 位，且不能与账号相同。
      保存后以加密形式写入项目目录 <code>password_overrides.json</code>，不修改 <code>/etc/default</code>。
    </p>
    <form method="post">
      <label for="cur">当前密码</label>
      <input id="cur" name="current_password" type="password" autocomplete="current-password" required placeholder="统一初始口令或您已设置的口令" />
      <label for="n1">新密码</label>
      <input id="n1" name="new_password" type="password" autocomplete="new-password" required placeholder="至少 8 个字符" minlength="8" />
      <label for="n2">确认新密码</label>
      <input id="n2" name="new_password_confirm" type="password" autocomplete="new-password" required placeholder="再次输入新密码" minlength="8" />
      <button type="submit">保存新密码</button>
    </form>
    <p class="back"><a href="{{ url_for('workspace') }}">返回工作台</a></p>
  </div>
</body>
</html>
