<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>员工绩效分析 - 登录</title>
  <style>
    body { font-family: "Microsoft YaHei", sans-serif; background: #eef2f7; margin: 0; }
    .box { width: 400px; margin: 72px auto; background: #fff; border-radius: 10px; padding: 28px 28px 22px; box-shadow: 0 4px 20px rgba(0,0,0,.06); }
    h1 { font-size: 20px; margin: 0 0 18px; color: #1a1a1a; }
    label { display: block; margin: 10px 0 6px; color: #444; font-size: 14px; }
    input { width: 100%; box-sizing: border-box; padding: 10px 12px; border: 1px solid #d0d7de; border-radius: 8px; font-size: 14px; }
    button { width: 100%; margin-top: 18px; padding: 11px; border: none; border-radius: 8px; background: #0969da; color: #fff; font-size: 15px; cursor: pointer; }
    .err { color: #cf222e; font-size: 13px; margin-bottom: 10px; }
    .hint { font-size: 12px; color: #656d76; margin-top: 14px; line-height: 1.5; }
  </style>
</head>
<body>
  <div class="box">
    <h1>员工绩效分析（网页版）</h1>
    {% with messages = get_flashed_messages() %}
      {% if messages %}<div class="err">{{ messages[0] }}</div>{% endif %}
    {% endwith %}
    <form method="post">
      <label for="u">账号</label>
      <input id="u" name="username" autocomplete="username" placeholder="请输入账号" />
      <label for="p">密码</label>
      <input id="p" name="password" type="password" autocomplete="current-password" placeholder="请输入密码" />
      <button type="submit">登录</button>
    </form>
    <p class="hint">
      账号与密码（任选其一登录）：<br />
      HR 管理员 hr_admin / HrPerf@2026<br />
      HR 用户 hr_user / HrUser@2026<br />
      IT 管理员 it_admin / ItOps@2026<br />
      浏览 viewer / ViewOnly@2026
    </p>
  </div>
</body>
</html>
